services:
  - type: web
    name: iys-dashboard
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: cd dashboard && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        generateValue: true
      - key: DASHBOARD_AUTH
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
